<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1600" viewBox="0 0 1600 1600">
  <defs>
    <style>
      .title { font: 700 34px "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; fill: #172033; }
      .subtitle { font: 400 17px "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; fill: #526078; }
      .box-title { font: 700 20px "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; fill: #172033; }
      .box-text { font: 400 17px "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; fill: #25324a; }
      .small { font: 400 15px "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; fill: #526078; }
      .label { font: 700 15px "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; fill: #33415c; }
      .node { stroke: #33415c; stroke-width: 2; rx: 16; ry: 16; }
      .decision { fill: #e7f0ff; stroke: #3972c4; stroke-width: 2; }
      .long { fill: #e8f8ed; stroke: #2d9c55; }
      .short { fill: #fff1df; stroke: #da7b16; }
      .hedge { fill: #f0ebff; stroke: #7656c8; }
      .exit { fill: #ffe9e9; stroke: #cf4d4d; }
      .neutral { fill: #f6f8fb; stroke: #7c889e; }
      .guard { fill: #fff8d9; stroke: #b99a16; }
      .arrow { fill: none; stroke: #526078; stroke-width: 2.4; marker-end: url(#arrow); }
      .dash { fill: none; stroke: #8c98aa; stroke-width: 2; stroke-dasharray: 7 7; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#526078"/>
    </marker>
  </defs>

  <rect width="1600" height="1250" fill="#ffffff"/>
  <text x="800" y="50" text-anchor="middle" class="title">原始 ATM IV 跨式策略｜每日判断流程</text>
  <text x="800" y="82" text-anchor="middle" class="subtitle">绝对 ATM IV 信号 · 固定初始张数 · 日频 Delta 对冲 · DTE 展期</text>

  <rect x="610" y="105" width="380" height="72" class="node neutral"/>
  <text x="800" y="135" text-anchor="middle" class="box-title">每日收盘：读取标的与期权链</text>
  <text x="800" y="161" text-anchor="middle" class="box-text">选择可用 ATM Call / Put，计算 ATM IV</text>

  <path d="M800 177 L800 215" class="arrow"/>
  <polygon points="800,215 960,275 800,335 640,275" class="decision"/>
  <text x="800" y="270" text-anchor="middle" class="box-title">当前是否持有期权仓位？</text>
  <text x="800" y="296" text-anchor="middle" class="small">同一账户只持有一个方向</text>

  <!-- No-position branch -->
  <path d="M640 275 L425 275" class="arrow"/>
  <text x="535" y="260" text-anchor="middle" class="label">否：判断开仓</text>

  <polygon points="300,215 425,275 300,335 175,275" class="decision"/>
  <text x="300" y="267" text-anchor="middle" class="box-title">ATM IV ≤ 买方</text>
  <text x="300" y="292" text-anchor="middle" class="box-text">开仓阈值？</text>

  <path d="M300 335 L300 375" class="arrow"/>
  <text x="318" y="360" class="label">是</text>
  <rect x="155" y="375" width="290" height="80" class="node long"/>
  <text x="300" y="407" text-anchor="middle" class="box-title">买入 ATM 跨式</text>
  <text x="300" y="434" text-anchor="middle" class="box-text">Call / Put 各固定初始张数</text>

  <path d="M175 275 L90 275 L90 500 L175 500" class="arrow"/>
  <text x="105" y="260" class="label">否</text>
  <polygon points="300,440 425,500 300,560 175,500" class="decision"/>
  <text x="300" y="492" text-anchor="middle" class="box-title">ATM IV ≥ 卖方</text>
  <text x="300" y="517" text-anchor="middle" class="box-text">开仓阈值？</text>

  <path d="M300 560 L300 600" class="arrow"/>
  <text x="318" y="585" class="label">是</text>
  <rect x="155" y="600" width="290" height="80" class="node short"/>
  <text x="300" y="632" text-anchor="middle" class="box-title">卖出 ATM 跨式</text>
  <text x="300" y="659" text-anchor="middle" class="box-text">Call / Put 各固定初始张数</text>

  <path d="M175 500 L90 500 L90 1330 L610 1330" class="arrow"/>
  <text x="105" y="485" class="label">否：不交易</text>

  <!-- Existing-position branch -->
  <path d="M960 275 L1170 275" class="arrow"/>
  <text x="1065" y="260" text-anchor="middle" class="label">是：判断退出</text>
  <polygon points="1300,210 1450,275 1300,340 1150,275" class="decision"/>
  <text x="1300" y="258" text-anchor="middle" class="box-title">达到 IV 平仓阈值？</text>
  <text x="1300" y="285" text-anchor="middle" class="box-text">买方：IV ≥ 买方平仓阈值</text>
  <text x="1300" y="310" text-anchor="middle" class="box-text">卖方：IV ≤ 卖方平仓阈值</text>

  <path d="M1450 275 L1515 275 L1515 420 L1450 420" class="arrow"/>
  <text x="1472" y="260" class="label">是</text>
  <rect x="1160" y="380" width="290" height="80" class="node exit"/>
  <text x="1305" y="412" text-anchor="middle" class="box-title">全部平掉期权仓位</text>
  <text x="1305" y="439" text-anchor="middle" class="box-text">ETF 对冲仓位同时归零</text>

  <path d="M1300 340 L1090 340 L1090 555 L1170 555" class="arrow"/>
  <text x="1108" y="365" class="label">否</text>
  <polygon points="1300,500 1430,555 1300,610 1170,555" class="decision"/>
  <text x="1300" y="548" text-anchor="middle" class="box-title">DTE ≤ 展期阈值？</text>
  <text x="1300" y="574" text-anchor="middle" class="small">仅 DTE 触发，不按行权价偏离展期</text>

  <path d="M1430 555 L1515 555 L1515 675 L1430 675" class="arrow"/>
  <text x="1450" y="540" class="label">是</text>
  <rect x="1120" y="635" width="310" height="80" class="node neutral"/>
  <text x="1275" y="667" text-anchor="middle" class="box-title">寻找次月 ATM 跨式</text>
  <text x="1275" y="694" text-anchor="middle" class="box-text">读取次月合约自身 ATM IV</text>

  <path d="M1275 715 L1275 755" class="arrow"/>
  <polygon points="1275,755 1435,815 1275,875 1115,815" class="decision"/>
  <text x="1275" y="798" text-anchor="middle" class="box-title">次月存在且仍符合</text>
  <text x="1275" y="824" text-anchor="middle" class="box-text">原方向开仓阈值？</text>
  <text x="1275" y="848" text-anchor="middle" class="small">买方需低 IV；卖方需高 IV</text>

  <path d="M1115 815 L1015 815 L1015 935" class="arrow"/>
  <text x="1065" y="800" text-anchor="middle" class="label">是</text>
  <rect x="755" y="895" width="260" height="80" class="node neutral"/>
  <text x="885" y="927" text-anchor="middle" class="box-title">展期</text>
  <text x="885" y="954" text-anchor="middle" class="box-text">平旧仓 → 次月重新等量开仓</text>

  <path d="M1435 815 L1515 815 L1515 935 L1435 935" class="arrow"/>
  <text x="1452" y="800" class="label">否</text>
  <rect x="1125" y="895" width="310" height="80" class="node exit"/>
  <text x="1280" y="927" text-anchor="middle" class="box-title">关闭原仓，不展期</text>
  <text x="1280" y="954" text-anchor="middle" class="box-text">无合约或次月 IV 不满足阈值</text>

  <!-- Delta hedge merge -->
  <path d="M1300 610 L1080 610 L1080 1050 L990 1050" class="arrow"/>
  <text x="1155" y="595" class="label">否</text>
  <path d="M445 415 L530 415 L530 1050 L610 1050" class="arrow"/>
  <path d="M445 640 L530 640 L530 1050" class="arrow"/>
  <path d="M885 975 L885 1010" class="arrow"/>

  <rect x="610" y="1010" width="380" height="80" class="node hedge"/>
  <text x="800" y="1042" text-anchor="middle" class="box-title">计算收盘后组合 Delta</text>
  <text x="800" y="1069" text-anchor="middle" class="box-text">期权 Delta + 当前 ETF 对冲数量</text>

  <path d="M800 1090 L800 1130" class="arrow"/>
  <polygon points="800,1130 940,1190 800,1250 660,1190" class="decision"/>
  <text x="800" y="1182" text-anchor="middle" class="box-title">Delta 的方向？</text>
  <text x="800" y="1208" text-anchor="middle" class="small">目标容忍比例与绝对值均为 0</text>

  <path d="M660 1190 L490 1190" class="arrow"/>
  <text x="575" y="1175" text-anchor="middle" class="label">负 Delta</text>
  <rect x="185" y="1150" width="305" height="80" class="node hedge"/>
  <text x="338" y="1182" text-anchor="middle" class="box-title">买入 / 调整 ETF 多头</text>
  <text x="338" y="1209" text-anchor="middle" class="box-text">只允许 ETF ≥ 0，不建立 ETF 空头</text>

  <path d="M940 1190 L1080 1190" class="arrow"/>
  <text x="1010" y="1175" text-anchor="middle" class="label">正 Delta</text>
  <rect x="1080" y="1150" width="330" height="80" class="node hedge"/>
  <text x="1245" y="1182" text-anchor="middle" class="box-title">先清 ETF 多头，再调整期权腿</text>
  <text x="1245" y="1209" text-anchor="middle" class="box-text">Call / Put 数量可变为不等量</text>

  <path d="M800 1250 L800 1290" class="arrow"/>
  <text x="818" y="1272" class="label">接近 0</text>

  <!-- Account guard and loop -->
  <path d="M338 1230 L338 1330 L610 1330" class="arrow"/>
  <path d="M1245 1230 L1245 1330 L990 1330" class="arrow"/>
  <path d="M1305 460 L1560 460 L1560 1330 L990 1330" class="arrow"/>
  <path d="M1280 975 L1515 975 L1515 1330 L990 1330" class="arrow"/>
  <rect x="610" y="1290" width="380" height="80" class="node guard"/>
  <text x="800" y="1322" text-anchor="middle" class="box-title">账户层约束检查</text>
  <text x="800" y="1349" text-anchor="middle" class="box-text">现金储备、保证金、资金占用、数据完整性</text>

  <path d="M800 1370 L800 1410" class="arrow"/>
  <rect x="610" y="1410" width="380" height="70" class="node neutral"/>
  <text x="800" y="1440" text-anchor="middle" class="box-title">记录当日净值、持仓、Greeks 与费用</text>
  <text x="800" y="1466" text-anchor="middle" class="small">下一交易日重复上述流程</text>

  <path d="M610 1445 L545 1445 L545 141 L610 141" class="dash"/>

  <rect x="110" y="1530" width="1380" height="42" rx="12" ry="12" fill="#f6f8fb" stroke="#c9d1de"/>
  <text x="800" y="1557" text-anchor="middle" class="small">不使用：IV 分位数、HV 价差、冲高回落等待、成交量退出、日亏损止损、冷却期、动态 IV 阶梯仓位、行权价偏离展期</text>
</svg>
